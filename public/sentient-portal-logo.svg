<svg width="600" height="200" viewBox="0 0 600 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- S Icon with Portal Effect -->
  <defs>
    <linearGradient id="portalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Portal Circle -->
  <circle cx="80" cy="100" r="70" fill="url(#portalGradient)" opacity="0.2" filter="url(#glow)"/>
  <circle cx="80" cy="100" r="60" fill="none" stroke="url(#portalGradient)" stroke-width="3" opacity="0.6"/>
  <circle cx="80" cy="100" r="50" fill="none" stroke="url(#portalGradient)" stroke-width="2" opacity="0.4"/>

  <!-- S Letter in Portal -->
  <path d="M 95 70 C 95 60, 85 55, 75 55 C 65 55, 55 60, 55 70 C 55 80, 65 85, 75 85 C 85 85, 95 90, 95 100 C 95 110, 85 115, 75 115 C 65 115, 55 110, 55 100"
        stroke="white" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Sentient Portal Text -->
  <text x="170" y="90" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" filter="url(#glow)">
    Sentient Portal
  </text>

  <!-- Tagline positioned below -->
  <text x="170" y="125" font-family="Arial, sans-serif" font-size="20" font-weight="300" fill="white" opacity="0.95">
    Building a Human-Only Web
  </text>
</svg>
